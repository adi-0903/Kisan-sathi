<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#062416" />
      <stop offset="50%" stop-color="#0b3c25" />
      <stop offset="100%" stop-color="#041a10" />
    </linearGradient>
    
    <!-- Sprout Gradient -->
    <linearGradient id="sproutGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Ring Gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>

  <!-- Base Circle Background with Golden Ring -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="url(#ringGrad)" stroke-width="8" stroke-opacity="0.85" />

  <!-- Stylized Farming Soil/Hills -->
  <path d="M 40 400 Q 160 360 256 390 T 472 380 L 472 472 L 40 472 Z" fill="#04120a" opacity="0.6" />
  <path d="M 40 430 Q 120 400 256 420 T 472 410 L 472 472 L 40 472 Z" fill="#020804" />

  <!-- Tractor silhouette in background (subtle gold) -->
  <g transform="translate(140, 290) scale(0.65)" opacity="0.35">
    <path d="M120,40 h40 v20 h-40 z" fill="#fbbf24" />
    <path d="M100,60 h90 v10 h-90 z" fill="#fbbf24" />
    <circle cx="80" cy="110" r="25" fill="#fbbf24" />
    <circle cx="170" cy="100" r="40" fill="#fbbf24" />
    <path d="M110,60 L130,10 h10 L135,60 z" fill="#fbbf24" />
  </g>

  <!-- The Golden Sprout (Main Hero) -->
  <g transform="translate(256, 260) scale(1.6)">
    <!-- Stem -->
    <path d="M 0 60 C -10 20 -20 -10 -5 -35 C -5 -35 -2 -30 -2 -20 C -2 10 10 30 0 60 Z" fill="url(#sproutGrad)" />
    
    <!-- Left Leaf -->
    <path d="M -5 -35 C -35 -30 -45 -5 -15 15 C -5 25 -10 5 -5 -35 Z" fill="url(#sproutGrad)" />
    
    <!-- Right Leaf -->
    <path d="M -5 -35 C 20 -45 40 -25 25 5 C 15 20 10 5 -5 -35 Z" fill="url(#sproutGrad)" />

    <!-- Center bud leaf -->
    <path d="M -5 -35 C -10 -55 5 -55 0 -35 Z" fill="#34d399" />
  </g>

  <!-- Glow effect -->
  <circle cx="256" cy="220" r="90" fill="#34d399" opacity="0.1" filter="blur(20px)" />
</svg>
